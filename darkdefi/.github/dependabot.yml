version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "x402agent"
    assignees:
      - "x402agent"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/automaton-main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "x402agent"
    assignees:
      - "x402agent"

  - package-ecosystem: "npm"
    directory: "/clawd-tui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "x402agent"
    assignees:
      - "x402agent"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "x402agent"
    assignees:
      - "x402agent"
