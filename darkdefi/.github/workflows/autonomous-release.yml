name: Autonomous $CLAWD Release Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: autonomous-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-when-market-cap-unlocks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check $CLAWD market cap with Birdeye
        id: clawd
        env:
          BIRDEYE_API_KEY: ${{ secrets.BIRDEYE_API_KEY }}
          CLAWD_TOKEN_ADDRESS: ${{ secrets.CLAWD_TOKEN_ADDRESS }}
          CLAWD_MARKET_CAP_TARGET: ${{ vars.CLAWD_MARKET_CAP_TARGET || '100000' }}
        run: node scripts/check-clawd-market-cap.mjs

      - name: Stop while the gate is closed
        if: steps.clawd.outputs.threshold_met != 'true'
        run: |
          echo "DarkDefi remains dark."
          echo "Market cap: ${{ steps.clawd.outputs.market_cap }}"
          echo "Target: ${{ steps.clawd.outputs.target }}"

      - name: Create autonomous release
        if: steps.clawd.outputs.threshold_met == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          MARKET_CAP: ${{ steps.clawd.outputs.market_cap }}
          TARGET: ${{ steps.clawd.outputs.target }}
          TOKEN_ADDRESS: ${{ steps.clawd.outputs.token_address }}
          MARKET_CAP_FIELD: ${{ steps.clawd.outputs.market_cap_field }}
        run: |
          TAG="clawd-unlocked"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists."
            exit 0
          fi

          cat > release-notes.md <<EOF
          # DarkDefi unlocked

          The release gate opened autonomously.

          - Token: \$CLAWD
          - Birdeye market cap: \$${MARKET_CAP}
          - Birdeye field: ${MARKET_CAP_FIELD}
          - Target: \$${TARGET}
          - Token address: $TOKEN_ADDRESS
          - Source: Birdeye
          - Chain: Solana
          - Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          This release is a public automation checkpoint. It is not financial advice and does not represent a trading signal.
          EOF

          gh release create "$TAG" \
            --title "DarkDefi unlocked: \$CLAWD crossed \$${TARGET}" \
            --notes-file release-notes.md \
            --latest

      - name: Notify on release
        if: steps.clawd.outputs.threshold_met == 'true'
        run: |
          echo "Release gate completed."
