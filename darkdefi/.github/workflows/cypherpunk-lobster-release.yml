name: Cypherpunk Lobster 4:20 Release

on:
  workflow_dispatch:
  schedule:
    - cron: "20 20 8 5 *"

concurrency:
  group: cypherpunk-lobster-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-at-420-eastern:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check launch window
        id: launch
        shell: bash
        run: |
          eastern_date="$(TZ=America/New_York date +%Y-%m-%d)"
          eastern_time="$(TZ=America/New_York date +%H%M)"

          if [[ "$eastern_date" != "2026-05-08" ]]; then
            echo "launch=false" >> "$GITHUB_OUTPUT"
            echo "This one-time release only runs on 2026-05-08 America/New_York."
            exit 0
          fi

          if [[ "$eastern_date" == "2026-05-08" && "$eastern_time" < "1620" ]]; then
            echo "launch=false" >> "$GITHUB_OUTPUT"
            echo "It is not 4:20 PM Eastern yet."
            exit 0
          fi

          echo "launch=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.launch.outputs.launch == 'true'
        uses: actions/checkout@v4

      - name: Setup Bun
        if: steps.launch.outputs.launch == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        if: steps.launch.outputs.launch == 'true'
        run: bun install --frozen-lockfile

      - name: Verify release candidate
        if: steps.launch.outputs.launch == 'true'
        run: |
          bun run typecheck
          bun run test
          bun run build
          bun run build:lib

      - name: Pack root TUI artifact
        if: steps.launch.outputs.launch == 'true'
        run: |
          mkdir -p release-artifacts
          npm pack --pack-destination release-artifacts

      - name: Create 4:20 release
        if: steps.launch.outputs.launch == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="darkdefi-420"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists."
            exit 0
          fi

          cat > release-notes.md <<'EOF'
          # DarkDefi 4:20

          The cypherpunk lobster release window opened.

          - Target: May 8, 2026 at 4:20 PM Eastern
          - UTC: May 8, 2026 at 20:20 UTC
          - Chain focus: Solana
          - Operator surface: Dark Ralph / Clawd
          - Rule: no secrets, no signal, no custody

          This release is a public automation checkpoint. It is not financial advice and does not represent a trading signal.
          EOF

          gh release create "$TAG" \
            --title "DarkDefi 4:20: cypherpunk lobster release" \
            --notes-file release-notes.md \
            release-artifacts/*.tgz
