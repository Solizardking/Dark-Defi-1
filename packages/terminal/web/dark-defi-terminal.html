<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌑 Dark DeFi Terminal | Privacy-First Trading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a2e;
            --border: #1e1e36;
            --purple: #b366ff;
            --cyan: #00fff9;
            --pink: #ff0080;
            --green: #39ff14;
            --yellow: #ffb800;
            --text: #e0e0e0;
            --text2: #a0a0a0;
            --dim: #606060;
        }

        body {
            font-family: 'Courier New', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 249, 0.015) 2px,
                rgba(0, 255, 249, 0.015) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ── Layout ── */
        .app { display: flex; flex-direction: column; height: 100vh; }

        header {
            background: var(--surface);
            border-bottom: 2px solid var(--purple);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(179,102,255,0.25);
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .brand h1 {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(90deg, var(--purple), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: brightness(1) drop-shadow(0 0 6px var(--purple)); }
            to   { filter: brightness(1.3) drop-shadow(0 0 16px var(--cyan)); }
        }

        .brand .sub {
            font-size: 12px;
            color: var(--dim);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 11px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 10px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .dot.green  { background: var(--green);  box-shadow: 0 0 8px var(--green); }
        .dot.purple { background: var(--purple); box-shadow: 0 0 8px var(--purple); }
        .dot.red    { background: var(--pink);   box-shadow: 0 0 8px var(--pink); }
        .dot.yellow { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        nav {
            display: flex;
            gap: 2px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            flex-shrink: 0;
        }

        .tab {
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text2);
            padding: 10px 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 0.08em;
            transition: all 0.2s;
        }

        .tab:hover  { color: var(--text); background: rgba(255,255,255,0.04); }
        .tab.active { color: var(--purple); border-bottom-color: var(--purple); }

        .main {
            flex: 1;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 0;
        }

        @media (max-width: 1100px) {
            .main { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }

        .content-area {
            overflow-y: auto;
            padding: 20px;
        }

        .sidebar {
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 16px;
            background: var(--surface);
        }

        /* ── Panel ── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 16px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            color: var(--cyan);
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.06em;
        }

        /* ── Chat ── */
        .chat-log {
            height: calc(100vh - 310px);
            min-height: 300px;
            overflow-y: auto;
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-log::-webkit-scrollbar       { width: 6px; }
        .chat-log::-webkit-scrollbar-track { background: var(--bg); }
        .chat-log::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 3px; }

        .msg {
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: fadein 0.25s ease;
        }

        @keyframes fadein { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:none } }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--dim);
        }

        .avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
        }

        .avatar.user  { background: var(--purple); }
        .avatar.agent { background: var(--surface2); border: 1px solid var(--cyan); }

        .msg-body {
            background: rgba(255,255,255,0.04);
            border-left: 2px solid var(--border);
            padding: 10px 14px;
            border-radius: 0 6px 6px 0;
            font-size: 13px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg-body.user  { border-left-color: var(--purple); }
        .msg-body.agent { border-left-color: var(--cyan); }
        .msg-body.error { border-left-color: var(--pink); color: var(--pink); }

        .msg-body code {
            background: rgba(0,0,0,0.5);
            padding: 1px 5px;
            border-radius: 3px;
            color: var(--green);
            font-size: 12px;
        }

        .provider-badge {
            font-size: 10px;
            background: rgba(0,255,249,0.1);
            color: var(--cyan);
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid rgba(0,255,249,0.2);
        }

        /* ── Input row ── */
        .input-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .chat-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 11px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 12px rgba(179,102,255,0.25);
        }

        .send-btn {
            background: var(--purple);
            border: none;
            color: var(--bg);
            padding: 11px 22px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.06em;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--purple);
            transform: translateY(-1px);
        }

        .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(179,102,255,0.3);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Example cards (sidebar) ── */
        .ex-card {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ex-card:hover {
            border-color: var(--purple);
            box-shadow: 0 0 12px rgba(179,102,255,0.18);
        }

        .ex-title { color: var(--cyan); font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .ex-desc  { color: var(--text2); font-size: 11px; margin-bottom: 8px; }

        .tags { display: flex; flex-wrap: wrap; gap: 4px; }

        .tag {
            background: rgba(179,102,255,0.15);
            color: var(--purple);
            padding: 2px 7px;
            border-radius: 10px;
            font-size: 10px;
        }

        /* ── Docs ── */
        .doc-block { margin-bottom: 24px; }
        .doc-block h3 { color: var(--cyan); font-size: 15px; margin-bottom: 8px; }
        .doc-block p  { color: var(--text2); font-size: 13px; line-height: 1.65; white-space: pre-line; }

        /* ── Stats ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat {
            background: rgba(0,0,0,0.3);
            border-left: 3px solid var(--purple);
            padding: 12px;
            border-radius: 4px;
        }

        .stat-label { color: var(--dim); font-size: 10px; letter-spacing: 0.1em; margin-bottom: 4px; }
        .stat-value { color: var(--cyan); font-size: 20px; font-weight: bold; }

        .act-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .act-btn {
            background: rgba(179,102,255,0.08);
            border: 1px solid var(--purple);
            color: var(--purple);
            padding: 11px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            transition: all 0.2s;
        }

        .act-btn:hover {
            background: rgba(179,102,255,0.18);
            box-shadow: 0 0 12px rgba(179,102,255,0.25);
        }

        /* ── Config panel ── */
        .cfg-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .cfg-row:last-child { border-bottom: none; }
        .cfg-key   { color: var(--text2); }
        .cfg-val   { color: var(--cyan); font-weight: bold; }
        .cfg-ok    { color: var(--green); }
        .cfg-miss  { color: var(--pink); }

        /* ── Alert banners ── */
        .banner {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .banner.warn  { background: rgba(255,184,0,0.1);  border: 1px solid var(--yellow); color: var(--yellow); }
        .banner.error { background: rgba(255,0,128,0.1);  border: 1px solid var(--pink);   color: var(--pink); }
        .banner.ok    { background: rgba(57,255,20,0.1);  border: 1px solid var(--green);  color: var(--green); }
    </style>
</head>
<body>
<div class="app">

    <!-- ── Header ── -->
    <header>
        <div class="brand">
            <h1>🌑 DARK DEFI TERMINAL</h1>
            <span class="sub">Privacy-First Trading on Solana</span>
        </div>
        <div class="status-bar" id="statusBar">
            <div class="status-pill">
                <div class="dot yellow" id="serverDot"></div>
                <span id="serverLabel">connecting…</span>
            </div>
            <div class="status-pill">
                <div class="dot purple" id="aiDot"></div>
                <span id="aiLabel">AI: …</span>
            </div>
            <div class="status-pill">
                <div class="dot green" id="netDot"></div>
                <span id="netLabel">devnet</span>
            </div>
        </div>
    </header>

    <!-- ── Nav tabs ── -->
    <nav>
        <button class="tab active" data-tab="agent">🤖 AI AGENT</button>
        <button class="tab" data-tab="docs">📚 DOCS</button>
        <button class="tab" data-tab="stats">📊 STATS</button>
        <button class="tab" data-tab="config">⚙️ CONFIG</button>
    </nav>

    <!-- ── Main layout ── -->
    <div class="main">
        <div class="content-area" id="contentArea">
            <!-- injected by JS -->
        </div>
        <aside class="sidebar" id="sidebar">
            <!-- injected by JS -->
        </aside>
    </div>

</div>

<script>
// ─────────────────────────────────────────────────
// Config & state
// ─────────────────────────────────────────────────
const API_BASE = window.location.origin; // hits the local server
let serverConfig = null;
let chatHistory = []; // [{role,content}]

// ─────────────────────────────────────────────────
// Boot — fetch server config
// ─────────────────────────────────────────────────
async function boot() {
    try {
        const r = await fetch(API_BASE + '/api/config');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        serverConfig = await r.json();

        // Update status bar
        document.getElementById('serverDot').className = 'dot green';
        document.getElementById('serverLabel').textContent = 'server: online';
        document.getElementById('netLabel').textContent = serverConfig.network ?? 'devnet';

        const aiOk = serverConfig.hasGoogleAI || serverConfig.hasXAI || serverConfig.hasRedPill;
        document.getElementById('aiDot').className = 'dot ' + (aiOk ? 'green' : 'yellow');
        document.getElementById('aiLabel').textContent = aiOk
            ? (serverConfig.hasGoogleAI ? 'Gemini' : serverConfig.hasXAI ? 'Grok' : 'RedPill')
            : 'AI: fallback';

    } catch (e) {
        document.getElementById('serverDot').className = 'dot red';
        document.getElementById('serverLabel').textContent = 'server: offline';
        document.getElementById('aiDot').className = 'dot red';
        document.getElementById('aiLabel').textContent = 'AI: unavailable';
        console.warn('Cannot reach local server:', e.message);
    }

    renderTab(currentTab);
}

// ─────────────────────────────────────────────────
// Tab routing
// ─────────────────────────────────────────────────
let currentTab = 'agent';

document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        renderTab(currentTab);
    });
});

function renderTab(tab) {
    const content = document.getElementById('contentArea');
    const sidebar = document.getElementById('sidebar');

    if (tab === 'agent') {
        content.innerHTML = buildAgentTab();
        sidebar.innerHTML = buildSidebar();
        bindChatEvents();
        scrollChatToBottom();
    } else if (tab === 'docs') {
        content.innerHTML = buildDocsTab();
        sidebar.innerHTML = '';
    } else if (tab === 'stats') {
        content.innerHTML = buildStatsTab();
        sidebar.innerHTML = buildPrivacyPanel();
    } else if (tab === 'config') {
        content.innerHTML = buildConfigTab();
        sidebar.innerHTML = '';
    }
}

// ─────────────────────────────────────────────────
// Chat tab
// ─────────────────────────────────────────────────
const INITIAL_MESSAGE = {
    role: 'agent',
    content: `🌑 Dark DeFi Agent online.

I'm your privacy-first DeFi assistant with deep knowledge of the Dark Protocol on Solana.

Ask me about:
• Shielded wallets & Zcash cryptography
• Private transfers & note encryption
• FHE encrypted trading & dark pools
• TEE-secured AI agents
• Cross-chain bridges (ETH → Solana)
• Viewing keys & compliance

Or click an example in the sidebar →`,
    time: new Date()
};

if (chatHistory.length === 0) chatHistory.push(INITIAL_MESSAGE);

function buildAgentTab() {
    const msgs = chatHistory.map(m => renderMsg(m)).join('');
    return `
    <div class="panel" style="height: calc(100vh - 170px); display:flex; flex-direction:column;">
        <div class="panel-header">
            <div class="panel-title">🤖 Dark DeFi Agent</div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="provider-badge" id="provBadge">-</span>
                <div class="dot green"></div>
                <span style="font-size:11px;color:var(--dim)">ONLINE</span>
            </div>
        </div>
        <div class="chat-log" id="chatLog">${msgs}</div>
        <div class="input-row">
            <input type="text" class="chat-input" id="chatInput"
                   placeholder="Ask about Dark Protocol…" autocomplete="off"/>
            <button class="send-btn" id="sendBtn">SEND</button>
        </div>
    </div>`;
}

function renderMsg(m) {
    const isAgent = m.role === 'agent';
    const name = isAgent ? 'Dark Agent' : 'You';
    const avatarEmoji = isAgent ? '🌑' : '👤';
    const cls = m.error ? 'error' : m.role;
    const time = m.time ? new Date(m.time).toLocaleTimeString() : '';
    const badge = m.provider ? `<span class="provider-badge">${m.provider}</span>` : '';
    return `
    <div class="msg">
        <div class="msg-header">
            <div class="avatar ${m.role}">${avatarEmoji}</div>
            <strong style="font-size:12px;color:var(--text2)">${name}</strong>
            <span>${time}</span>
            ${badge}
        </div>
        <div class="msg-body ${cls}">${escHtml(m.content)}</div>
    </div>`;
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/`([^`]+)`/g, '<code>$1</code>');
}

function scrollChatToBottom() {
    const log = document.getElementById('chatLog');
    if (log) log.scrollTop = log.scrollHeight;
}

function bindChatEvents() {
    const input = document.getElementById('chatInput');
    const btn = document.getElementById('sendBtn');
    if (!input || !btn) return;

    btn.addEventListener('click', doSend);
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
    });
}

async function doSend() {
    const input = document.getElementById('chatInput');
    const btn = document.getElementById('sendBtn');
    const log = document.getElementById('chatLog');
    if (!input || !btn || !log) return;

    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    chatHistory.push({ role: 'user', content: text, time: new Date() });

    // Append user message
    const userEl = document.createElement('div');
    userEl.innerHTML = renderMsg(chatHistory.at(-1));
    log.appendChild(userEl.firstElementChild);
    scrollChatToBottom();

    // Thinking placeholder
    const thinkEl = document.createElement('div');
    thinkEl.className = 'msg';
    thinkEl.id = 'thinking';
    thinkEl.innerHTML = `
        <div class="msg-header">
            <div class="avatar agent">🌑</div>
            <strong style="font-size:12px;color:var(--text2)">Dark Agent</strong>
            <span class="spinner"></span>
        </div>
        <div class="msg-body agent">Thinking…</div>`;
    log.appendChild(thinkEl);
    scrollChatToBottom();

    // Build messages for API
    const systemContent = `You are the Dark DeFi Agent — an expert on the Dark Protocol, a privacy-first DeFi metaprotocol on Solana.

Your expertise covers:
- Zcash Sapling cryptography ported to Solana (zk-SNARKs, Pedersen commitments, nullifiers)
- Fully Homomorphic Encryption (FHE) for encrypted DeFi computations
- Shielded wallets with unlimited diversified addresses (ZIP-32 HD derivation)
- Private transfers using ChaCha20-Poly1305 note encryption
- Dark pools with MEV-resistant order matching
- Encrypted assets: eSOL, eBTC, eETH, eUSDC
- TEE-secured AI agents with on-chain attestation
- Cross-chain bridges (Ethereum, Bitcoin → Solana)
- View keys and selective disclosure for compliance

Be precise, technical but accessible. Include TypeScript code snippets when helpful. Always emphasize privacy guarantees.`;

    const apiMessages = [
        { role: 'system', content: systemContent },
        ...chatHistory.filter(m => m.role === 'user' || m.role === 'assistant').slice(-10).map(m => ({
            role: m.role === 'agent' ? 'assistant' : 'user',
            content: m.content
        }))
    ];

    try {
        const r = await fetch(API_BASE + '/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: apiMessages })
        });

        const data = await r.json();
        const agentMsg = {
            role: 'agent',
            content: data.reply ?? data.error ?? 'No response.',
            provider: data.provider,
            error: !!data.error && !data.reply,
            time: new Date()
        };
        chatHistory.push(agentMsg);

        // Update provider badge
        const badge = document.getElementById('provBadge');
        if (badge && data.provider) badge.textContent = data.provider;

        // Replace thinking with real reply
        thinkEl.innerHTML = renderMsg(agentMsg);
        thinkEl.removeAttribute('id');

    } catch (e) {
        const errMsg = { role: 'agent', content: '⚠️ Network error: ' + e.message, error: true, time: new Date() };
        chatHistory.push(errMsg);
        thinkEl.innerHTML = renderMsg(errMsg);
        thinkEl.removeAttribute('id');
    }

    scrollChatToBottom();
    btn.disabled = false;
    btn.innerHTML = 'SEND';
    input.focus();
}

// ─────────────────────────────────────────────────
// Sidebar — examples
// ─────────────────────────────────────────────────
const EXAMPLES = [
    {
        title: '🛡️ Shielded Wallet',
        desc: 'Create privacy-preserving wallets with Zcash-style addresses',
        tags: ['Wallet', 'Privacy', 'Zcash'],
        prompt: 'Show me how to create a shielded wallet with diversified addresses using the Dark Protocol SDK'
    },
    {
        title: '🔒 Private Transfer',
        desc: 'Send tokens without revealing sender, receiver, or amount',
        tags: ['Transfer', 'Encryption'],
        prompt: 'How does private transfer note encryption work in Dark Protocol? Show me the code.'
    },
    {
        title: '🌑 Dark Pool Trade',
        desc: 'Trade with encrypted liquidity and MEV protection',
        tags: ['DEX', 'MEV', 'FHE'],
        prompt: 'Explain how dark pool trading works and how it prevents MEV attacks'
    },
    {
        title: '🔐 FHE Operations',
        desc: 'Compute on encrypted data without decryption',
        tags: ['FHE', 'Encryption'],
        prompt: 'What FHE operations does Dark Protocol support? Show me add, multiply, compare examples.'
    },
    {
        title: '🤖 TEE AI Agent',
        desc: 'Autonomous trading in a Trusted Execution Environment',
        tags: ['AI', 'TEE'],
        prompt: 'How do I deploy a TEE-secured AI trading agent? What attestation does it provide?'
    },
    {
        title: '🌉 Cross-Chain Bridge',
        desc: 'One-tx deposits from Ethereum & Bitcoin to Solana',
        tags: ['Bridge', 'Multi-Chain'],
        prompt: 'How does the cross-chain bridge work? Can I bridge ETH and BTC to Solana privately?'
    },
    {
        title: '👁️ View Keys',
        desc: 'Share read-only access for audit without spending access',
        tags: ['Compliance', 'Audit'],
        prompt: 'What are view keys and how do I share them for compliance auditing?'
    },
    {
        title: '💎 eAssets',

// ─────────────────────────────────────────────────
function buildConfigTab() {
    const cfg = serverConfig;
    if (!cfg) return `<div class="banner error">⚠️ Cannot reach local server at ${API_BASE}<br><br>Make sure you started the server with <code>npm run serve</code></div>`;

    const row = (k, v, ok) => `
    <div class="cfg-row">
        <span class="cfg-key">${k}</span>
        <span class="${ok ? 'cfg-ok' : 'cfg-miss'}">${v}</span>
    </div>`;

    const aiProvider = cfg.hasGoogleAI ? 'Google Gemini ✅' : cfg.hasXAI ? 'XAI Grok ✅' : cfg.hasRedPill ? 'RedPill ✅' : '❌ not configured';

    return `
    <div class="panel" style="max-width:700px;">
        <div class="panel-header"><div class="panel-title">⚙️ Server Configuration</div></div>
        <div class="banner ok">✅ Connected to local server — API keys are server-side only, never exposed to the browser</div>
        ${row('NETWORK', cfg.network ?? 'devnet', true)}
        ${row('HELIUS_API_KEY', cfg.hasHelius ? '✅ configured' : '❌ missing (required)', cfg.hasHelius)}
        ${row('AI PROVIDER', aiProvider, cfg.hasGoogleAI || cfg.hasXAI || cfg.hasRedPill)}
        ${row('JUPITER_API_KEY', cfg.hasJupiter ? '✅ configured' : '⚠️ optional', cfg.hasJupiter)}
        ${cfg.heliusRpcUrl ? row('HELIUS_RPC_URL', cfg.heliusRpcUrl, true) : ''}
    </div>
    <div class="panel" style="max-width:700px;">
        <div class="panel-header"><div class="panel-title">📋 Setup Instructions</div></div>
        <div style="font-size:12px;color:var(--text2);line-height:1.8;">
            <p style="margin-bottom:8px;">1. Copy <code>.env.example</code> → <code>.env</code> in packages/terminal/</p>
            <p style="margin-bottom:8px;">2. Fill in your API keys (Helius required, AI key for chat)</p>
            <p style="margin-bottom:8px;">3. Run <code>npm run serve</code> to start this local server</p>
            <p style="margin-bottom:8px;">4. Open <code>http://localhost:3333</code> in your browser</p>
            <p style="color:var(--pink);">⚠️ Never commit .env — it's in .gitignore</p>
        </div>
    </div>`;
}
